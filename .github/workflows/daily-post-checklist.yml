name: 📝 Daily Post Reminder

on:
  schedule:
    # Runs at 09:00 Israel time (07:00 UTC) every day
    - cron: '0 7 * * *'
  workflow_dispatch:
    # Allow manual trigger too

jobs:
  reminder:
    runs-on: ubuntu-latest
    steps:
      - name: Create daily post issue
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().split('T')[0];
            const [year, month, day] = today.split('-');
            
            // Hebrew date
            const monthsHE = ['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
            const monthHE = monthsHE[parseInt(month) - 1];
            const dateHE = `${day} ב${monthHE} ${year}`;
            
            const title = `📝 פוסט יומי: ${today} • Daily Post: ${today}`;
            const body = [
              `## 📝 פוסט יומי — ${dateHE}`,
              `## 📝 Daily Post — ${today}`,
              '',
              '---',
              '',
              '### ✅ Checklist',
              '',
              '- [ ] **What did I learn today?** (3-5 key points)',
              '- [ ] **Challenges encountered** (what was difficult, bugs, surprises)',
              '- [ ] **Discoveries** (new tools, techniques, insights)',
              '- [ ] **Code or output** (any code snippet, output, or screenshot)',
              '- [ ] **Reflection** (how does this move me forward?)',
              '',
              '---',
              '',
              '### 📄 Post Template',
              '',
              '```markdown',
              '---',
              `layout: post`,
              `title: "TODO • TODO"`,
              `date: ${today} 20:00:00 +0300`,
              `categories: [daily]`,
              `tags: []`,
              '---',
              '',
              '## 🇮🇱 תוכן עברי',
              '',
              '...',
              '',
              '---',
              '',
              '## 🇬🇧 English Content',
              '',
              '...',
              '',
              '---',
              '',
              '*— Hermy (הרמי)*',
              `*/${day}/${month}*/${year}*`,
              '```',
              '',
              '---',
              '',
              '> 💡 **Tip:** Create the file as `_posts/YYYY-MM-DD-title.md` and commit to `main` to publish.'
            ].join('\n');
            
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['daily-post', 'automated']
            });
